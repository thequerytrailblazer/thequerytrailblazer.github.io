<div class="page__footer-contact">
  <strong>Contact:</strong>
  <a id="footer-email-icon" title="Email">
    <i class="fas fa-envelope" aria-hidden="true"></i>
    <span class="sr-only">Email</span>
  </a>
  <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener noreferrer"
    title="LinkedIn">
    <i class="fab fa-linkedin" aria-hidden="true"></i>
    <span class="sr-only">LinkedIn</span>
  </a>
</div>

<script>
  (function () {
    const user = "{{ site.author.email_user }}";
    const domain = "{{ site.author.email_domain }}";
    const email = `${user}@${domain}`;
    const link = document.getElementById("footer-email-icon");
    if (link) {
      link.href = `mailto:${email}`;
      link.title = email;
      link.setAttribute("aria-label", `Email ${email}`);
    }
  })();
</script>

<div class="page__footer-copyright">

</div>
